openapi: 3.0.3
info:
  title: Test API
  description: Minimal spec for unit tests.
  version: "1.0"

paths:
  /greet:
    post:
      operationId: greet
      summary: Greet a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GreetRequest'
      responses:
        '200':
          description: Greeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GreetResponse'

  /status:
    get:
      operationId: status
      summary: Service status
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

components:
  schemas:
    GreetRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    GreetResponse:
      type: object
      properties:
        greeting:
          type: string
        timestamp:
          type: string
          format: date-time

    StatusResponse:
      type: object
      properties:
        ok:
          type: boolean
